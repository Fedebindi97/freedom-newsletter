name: Nika Newsletter Issue

on:
  schedule:
    - cron: '0 8 * * 0'
  workflow_dispatch: 

jobs:
  scrape_and_message:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.14.5'

      - name: Install dependencies
        run: |
          pip install python-dotenv google-genai pymongo markdown mailchimp-marketing

      - name: Run script
        env:
          # This maps your GitHub Secrets to Environment Variables for Python
          SEAL_BOT_TOKEN: ${{ secrets.SEAL_BOT_TOKEN }}
          CHANNEL_ID: ${{ secrets.CHANNEL_ID }}
        run: python workflow.py
